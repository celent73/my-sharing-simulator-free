<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo_new.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050510" />

  <!-- PWA Settings -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="My Sharing Simulator">

  <title>My Sharing Simulator v1.3.15</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/logo_new.png">

  <!-- SCRIPT INSTALLAZIONE: Native Browser Prompt allowed -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Capture the install prompt globally
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent the mini-infobar from appearing on mobile
      e.preventDefault();
      // Stash the event so it can be triggered later.
      window.deferredPrompt = e;
      console.log('beforeinstallprompt captured in index.html');
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js?v=1.3.15')
          .then(registration => {
            console.log('Service Worker registered with scope:', registration.scope);
          })
          .catch(error => {
            console.error('Service Worker registration failed:', error);
          });
      });
    }

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          },
          colors: {
            'union-blue': {
              '50': '#f0f8ff',
              '100': '#e0f0fe',
              '400': '#3b9eff',
              '500': '#0077c8',
              '600': '#0066ad',
            },
            'union-orange': {
              '50': '#fff7ed',
              '100': '#ffedd5',
              '400': '#fb923c',
              '500': '#f97316',
              '600': '#ea580c',
            },
            'union-green': {
              '50': '#f0fdf4',
              '400': '#4ade80',
              '500': '#22c55e',
              '600': '#16a34a',
            },
            'union-black': '#2c3e50',
            'union-light': '#f8fafc',
          },
          keyframes: {
            shine: {
              '100%': { transform: 'translateX(100%)' },
            }
          },
          animation: {
            shine: 'shine 0.8s ease-in-out',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #f3f4f6;
      /* Light mode default */
      min-height: 100vh;
      transition: background-color 0.3s ease;
    }

    /* Galaxy Theme for Dark Mode */
    html.dark body {
      background-color: #050510;
      background-image:
        radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    /* Custom Scrollbar - Adaptive */
    ::-webkit-scrollbar,
    .custom-scrollbar::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track,
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f8fafc;
    }

    html.dark ::-webkit-scrollbar-track,
    html.dark .custom-scrollbar::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb,
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #64748b;
      border-radius: 6px;
      border: 3px solid #f8fafc;
    }

    html.dark ::-webkit-scrollbar-thumb,
    html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border: 3px solid #0a0a0a;
    }

    ::-webkit-scrollbar-thumb:hover,
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    html.dark ::-webkit-scrollbar-thumb:hover,
    html.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #cbd5e1;
    }

    /* --- DYNAMIC THEMES --- */
    :root {
      --accent-main: #f97316;
      --accent-glow: rgba(249, 115, 22, 0.4);
      --accent-hover: #ea580c;
      --header-bg: rgba(0, 0, 0, 0.85);
      --footer-bg: rgba(0, 0, 0, 0.85);
      --header-text: #ffffff;
      --footer-text: #ffffff;
    }

    /* 1. ORIGINAL (Galaxy Black) */
    .theme-original {
      --accent-main: #f97316;
      --accent-glow: rgba(249, 115, 22, 0.4);
      --header-bg: rgba(0, 0, 0, 0.85);
      --footer-bg: rgba(0, 0, 0, 0.85);
    }

    /* 2. TITAN GREY */
    .theme-titan {
      --accent-main: #94a3b8;
      --accent-glow: rgba(148, 163, 184, 0.4);
      --header-bg: rgba(30, 41, 59, 0.95);
      /* Deep Titan */
      --footer-bg: #0f172a;
    }

    /* 3. NIGHT BLUE */
    .theme-night-blue {
      --accent-main: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.4);
      --header-bg: rgba(15, 23, 42, 0.95);
      /* Midnight Blue */
      --footer-bg: #020617;
      /* Brighter Contrast for footer */
    }

    /* 4. UNION ORANGE */
    .theme-union-orange {
      --accent-main: #f97316;
      --accent-glow: rgba(249, 115, 22, 0.4);
      --header-bg: rgba(43, 15, 7, 0.95);
      /* Extremely Dark Burnt Orange */
      --footer-bg: #1c0a02;
      /* Almost Black Orange */
    }

    /* 5. UNION COLORS */
    .theme-union-colors {
      --accent-main: #f97316;
      /* Orange for active buttons */
      --accent-glow: rgba(249, 115, 22, 0.4);
      --header-bg: rgba(0, 119, 200, 0.95);
      /* Blue header */
      --footer-bg: rgba(249, 115, 22, 0.95);
      /* Orange footer */
    }

    /* 6. VERDONE SCURO */
    .theme-verdone-scuro {
      --accent-main: #22c55e;
      --accent-glow: rgba(34, 197, 94, 0.4);
      --header-bg: rgba(5, 20, 10, 0.95);
      --footer-bg: #021005;
    }

    /* Utility classes using variables */
    .bg-main-accent {
      background-color: var(--accent-main);
    }

    .text-main-accent {
      color: var(--accent-main);
    }

    .border-main-accent {
      border-color: var(--accent-main);
    }

    .shadow-main-accent {
      box-shadow: 0 10px 15px -3px var(--accent-glow), 0 4px 6px -4px var(--accent-glow) !important;
    }

    .bg-header-dynamic {
      background-color: var(--header-bg) !important;
    }

    .bg-footer-dynamic {
      background-color: var(--footer-bg) !important;
    }

    /* Firefox Support */
    * {
      scrollbar-width: thin;
      scrollbar-color: #64748b #f8fafc;
    }

    html.dark * {
      scrollbar-color: #94a3b8 #0a0a0a;
    }

    /* Hide scrollbar utility */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 7. VIOLA IMPERIALE */
    .theme-viola-imperiale {
      --accent-main: #a855f7;
      --accent-glow: rgba(168, 85, 247, 0.4);
      --header-bg: rgba(46, 16, 101, 0.95);
      --footer-bg: #1e1b4b;
    }

    /* 8. TRAMONTO */
    .theme-tramonto {
      --accent-main: #fb7185;
      --accent-glow: rgba(251, 113, 133, 0.4);
      --header-bg: rgba(76, 5, 25, 0.95);
      --footer-bg: #4c0519;
    }

    /* 9. ORO ANTICO */
    .theme-oro-antico {
      --accent-main: #eab308;
      --accent-glow: rgba(234, 179, 8, 0.4);
      --header-bg: rgba(28, 25, 23, 0.95);
      --footer-bg: #0c0a09;
    }
  </style>

</head>

<body
  class="bg-gray-100 dark:bg-[#050510] text-gray-900 dark:text-gray-100 font-sans antialiased selection:bg-blue-500/30 overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
